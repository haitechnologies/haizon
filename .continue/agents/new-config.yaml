name: Local Qwen Coder
version: 1.0.0
schema: v1

models:
  - name: Qwen2.5-Coder-7B
    provider: ollama
    model: qwen2.5-coder:7b-instruct-q4_k_m
    apiBase: http://127.0.0.1:11434
    roles: [chat, edit, apply]
    defaultCompletionOptions:
      contextLength: 8192
      temperature: 0.1
      numPredict: 2048
      stream: false

  - name: Qwen2.5-Coder-7B-Autocomplete
    provider: ollama
    model: qwen2.5-coder:7b-instruct-q4_k_m
    apiBase: http://127.0.0.1:11434
    roles: [autocomplete]
    defaultCompletionOptions:
      contextLength: 2048
      temperature: 0.2
      numPredict: 128
      stream: true
      stop: ["\n\n", "```", "#", "//"]

experimental:
  enableAgent: true
  autoAcceptEdits: false

mcpServers: []

context:
  - provider: code
  - provider: folder  
  - provider: codebase




  

